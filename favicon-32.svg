<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1410"/>
      <stop offset="100%" stop-color="#0B0F0C"/>
    </linearGradient>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16A34A"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="s" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EAB308"/>
      <stop offset="100%" stop-color="#fde047"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="16" cy="16" r="15.5" fill="url(#bg)"/>

  <!-- Green border ring -->
  <circle cx="16" cy="16" r="15" fill="none" stroke="#16A34A" stroke-width="1" opacity="0.55"/>

  <!-- Top bar -->
  <rect x="7.5" y="6" width="17" height="2" rx="1" fill="url(#g)"/>
  <!-- Bottom bar -->
  <rect x="7.5" y="24" width="17" height="2" rx="1" fill="url(#g)"/>

  <!-- Top glass outline -->
  <path d="M8.5 8 L23.5 8 L18.5 16 L13.5 16 Z" fill="#16A34A" opacity="0.08"/>
  <path d="M8.5 8 L23.5 8 L18.5 16 L13.5 16 Z" fill="none" stroke="#16A34A" stroke-width="0.6" opacity="0.3"/>

  <!-- Sand top (gold) -->
  <path d="M10.5 8 L21.5 8 L18.5 16 L13.5 16 Z" fill="url(#s)" opacity="0.6"/>

  <!-- Bottom glass outline -->
  <path d="M13.5 16 L18.5 16 L23.5 24 L8.5 24 Z" fill="#16A34A" opacity="0.08"/>
  <path d="M13.5 16 L18.5 16 L23.5 24 L8.5 24 Z" fill="none" stroke="#16A34A" stroke-width="0.6" opacity="0.3"/>

  <!-- Sand bottom (gold, bright) -->
  <path d="M9.5 24 L22.5 24 L19.5 19.5 L12.5 19.5 Z" fill="url(#s)" opacity="0.92"/>

  <!-- Neck dot -->
  <circle cx="16" cy="16" r="1.5" fill="#EAB308" opacity="0.95"/>
</svg>
