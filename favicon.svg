<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1040"/>
      <stop offset="100%" stop-color="#0f0c29"/>
    </linearGradient>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="sand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)" stroke="url(#grad)" stroke-width="2"/>

  <!-- Hourglass outer frame top bar -->
  <rect x="16" y="13" width="32" height="4" rx="2" fill="url(#grad)"/>
  <!-- Hourglass outer frame bottom bar -->
  <rect x="16" y="47" width="32" height="4" rx="2" fill="url(#grad)"/>

  <!-- Hourglass top half (sand container) -->
  <path d="M18 17 L46 17 L36 32 L28 32 Z" fill="url(#grad)" opacity="0.25"/>
  <!-- Sand in top half (partially empty) -->
  <path d="M22 17 L42 17 L36 32 L28 32 Z" fill="url(#sand)" opacity="0.7"/>

  <!-- Hourglass bottom half (sand container) -->
  <path d="M28 32 L36 32 L46 47 L18 47 Z" fill="url(#grad)" opacity="0.25"/>
  <!-- Sand collected at bottom -->
  <path d="M21 47 L43 47 L38 39 L26 39 Z" fill="url(#sand)" opacity="0.85"/>

  <!-- Narrow neck glow dot -->
  <circle cx="32" cy="32" r="2.5" fill="url(#grad)" opacity="0.9"/>

  <!-- Outer glow ring -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="url(#grad)" stroke-width="1" opacity="0.4"/>
</svg>
