<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bgGrad" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#0d2a12"/>
      <stop offset="100%" stop-color="#061008"/>
    </radialGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8c96a"/>
      <stop offset="50%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#a07830"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bgGrad)"/>

  <!-- Subtle Islamic geometric pattern -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="rgba(201,168,76,0.06)" stroke-width="0.5"/>
  <circle cx="32" cy="32" r="20" fill="none" stroke="rgba(201,168,76,0.08)" stroke-width="0.5"/>
  <circle cx="32" cy="32" r="14" fill="none" stroke="rgba(201,168,76,0.1)" stroke-width="0.5"/>

  <!-- 8-pointed star (Islamic symbol) -->
  <path d="M32 12 L34 24 L42 18 L36 26 L48 28 L36 30 L42 38 L34 32 L32 44 L30 32 L22 38 L28 30 L16 28 L28 26 L22 18 L30 24 Z"
        fill="url(#goldGrad)" opacity="0.85"/>

  <!-- Crescent moon -->
  <path d="M28 18 Q38 22 38 32 Q38 42 28 46 Q34 42 34 32 Q34 22 28 18Z"
        fill="url(#goldGrad)" opacity="0.95"/>

  <!-- Small star accent -->
  <circle cx="44" cy="20" r="1.5" fill="#e8c96a" opacity="0.9"/>
  <path d="M44 17 L44.5 19.5 L47 20 L44.5 20.5 L44 23 L43.5 20.5 L41 20 L43.5 19.5 Z"
        fill="#e8c96a" opacity="0.7"/>

  <!-- Bottom accent line -->
  <rect x="12" y="54" width="40" height="1" rx="0.5" fill="url(#greenGrad)" opacity="0.4"/>
</svg>
